<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenWear</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">GreenWear</div>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">رجالي</a>
        <a href="#">حريمي</a>
        <a href="#">أطفال</a>
    </nav>
    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>اكتشف أحدث صيحات الموضة</h1>
    <p>ملابس لجميع الأعمار بأفضل جودة</p>
    <button>تسوق الآن</button>
</section>

<section class="products">

<div class="product">
    <img src="https://via.placeholder.com/300x350" alt="">
    <h3>تيشيرت كلاسيك</h3>
    <p>250 جنيه</p>
    <button onclick="addToCart('تيشيرت كلاسيك',250)">أضف للسلة</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/300x350" alt="">
    <h3>هودي عصري</h3>
    <p>450 جنيه</p>
    <button onclick="addToCart('هودي عصري',450)">أضف للسلة</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/300x350" alt="">
    <h3>بنطلون كاجوال</h3>
    <p>350 جنيه</p>
    <button onclick="addToCart('بنطلون كاجوال',350)">أضف للسلة</button>
</div>

</section>

<div class="cart-sidebar" id="cart">
    <h2>سلة المشتريات</h2>
    <ul id="cart-items"></ul>
    <p id="total">الإجمالي: 0 جنيه</p>
</div>

<script src="script.js"></script>
</body>
</html>
