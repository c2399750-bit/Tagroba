<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>متجر الملابس</title>
                <link rel="stylesheet" href="style.css">
                </head>
                <body>
                    <header>
                            <h1>متجر الملابس</h1>
                                    <div class="cart">
                                                🛒 <span id="cart-count">0</span>
                                                        </div>
                                                            </header>

                                                                <main>
                                                                        <section class="products">
                                                                                    <div class="product">
                                                                                                    <img src="https://via.placeholder.com/150" alt="تيشيرت">
                                                                                                                    <h3>تيشيرت أخضر</h3>
                                                                                                                                    <p>السعر: 200 جنيه</p>
                                                                                                                                                    <button onclick="addToCart('تيشيرت أخضر', 200)">أضف للسلة</button>
                                                                                                                                                                </div>
                                                                                                                                                                            <div class="product">
                                                                                                                                                                                            <img src="https://via.placeholder.com/150" alt="بنطلون">
                                                                                                                                                                                                            <h3>بنطلون أبيض</h3>
                                                                                                                                                                                                                            <p>السعر: 300 جنيه</p>
                                                                                                                                                                                                                                            <button onclick="addToCart('بنطلون أبيض', 300)">أضف للسلة</button>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                    <div class="product">
                                                                                                                                                                                                                                                                                    <img src="https://via.placeholder.com/150" alt="هودي">
                                                                                                                                                                                                                                                                                                    <h3>هودي كلاسيك</h3>
                                                                                                                                                                                                                                                                                                                    <p>السعر: 400 جنيه</p>
                                                                                                                                                                                                                                                                                                                                    <button onclick="addToCart('هودي كلاسيك', 400)">أضف للسلة</button>
                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                        </section>

                                                                                                                                                                                                                                                                                                                                                                <section class="cart-items" id="cart-items">
                                                                                                                                                                                                                                                                                                                                                                            <h2>سلة المشتريات</h2>
                                                                                                                                                                                                                                                                                                                                                                                        <ul id="cart-list"></ul>
                                                                                                                                                                                                                                                                                                                                                                                                    <p id="total">الإجمالي: 0 جنيه</p>
                                                                                                                                                                                                                                                                                                                                                                                                            </section>
                                                                                                                                                                                                                                                                                                                                                                                                                </main>

                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
